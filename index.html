<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spanish Level 1 Comprehensive Quiz</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            margin: 0;
            padding: 0;
        }
        .header {
            background-color: #2c3e50;
            color: white;
            text-align: center;
            padding: 2em 1em;
            margin-bottom: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background-color: white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border-radius: 8px;
        }
        .question-card {
            border-bottom: 1px solid #e2e8f0;
            padding: 20px 0;
            transition: all 0.3s ease;
        }
        .question-card.hidden {
            display: none !important;
        }
        .question-text {
            font-size: 1.1em;
            font-weight: 600;
            margin-bottom: 12px;
        }
        .options {
            margin-left: 10px;
        }
        .option-label {
            display: block;
            margin: 8px 0;
            cursor: pointer;
            padding: 6px;
            border-radius: 4px;
        }
        .text-input {
            width: 100%;
            max-width: 300px;
            padding: 8px 12px;
            border: 1px solid #cbd5e1;
            border-radius: 4px;
            font-size: 1em;
        }
        .btn {
            background-color: #27ae60;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1.1em;
            border-radius: 4px;
            cursor: pointer;
            display: block;
            margin: 20px auto;
            transition: background 0.2s;
        }
        .btn:hover {
            background-color: #219653;
        }
        .btn-secondary {
            background-color: #2980b9;
        }
        .btn-secondary:hover {
            background-color: #2471a3;
        }
        .action-group {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
        }
        #results {
            margin-top: 30px;
            padding: 20px;
            border-radius: 4px;
            display: none;
            text-align: center;
        }
        .pass-box {
            background-color: #e8f8f5;
            border-left: 5px solid #2cc990;
        }
        .fail-box {
            background-color: #fdf2f2;
            border-left: 5px solid #ec5b5b;
        }
        .score-text {
            font-size: 1.6em;
            font-weight: bold;
        }
        .score-text.pass { color: #27ae60; }
        .score-text.fail { color: #c0392b; }
        
        .explanation-box {
            margin-top: 10px;
            padding: 10px 14px;
            border-radius: 4px;
            font-size: 0.95em;
            display: none;
        }
        .explanation-box.correct-bg {
            background-color: #e8f8f5;
            border-left: 4px solid #27ae60;
        }
        .explanation-box.incorrect-bg {
            background-color: #fdf2f2;
            border-left: 4px solid #c0392b;
        }
        .correct {
            color: #27ae60;
            font-weight: bold;
        }
        .incorrect {
            color: #c0392b;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="header">
    <h1>Spanish Level 1 Coursework Practice Quiz</h1>
    <p>Lessons 1-6 & 17-20 | 100 Questions | 100 Points</p>
</div>

<div class="container">
    <div id="results">
        <div class="score-text" id="scoreDisplay"></div>
        <p id="statusMessage"></p>
        <div class="action-group" id="actionButtons"></div>
    </div>

    <form id="quizForm">
        <div id="questionsContainer"></div>
        <button type="button" id="submitBtn" class="btn" onclick="gradeQuiz()">Submit Quiz for Grading</button>
    </form>
</div>

<script>
    // Master bank containing all unique 100 context words and phrases[cite: 11]
    const masterQuizData = [
        {"id": 1, "type": "mcq", "question": "How do you say 'hello' in Spanish?", "options": ["Hola", "Adiós", "Gracias", "Por favor"], "answer": "Hola", "explanation": "Lesson 1: 'Hola' means hello."},
        {"id": 2, "type": "mcq", "question": "What is the Spanish pronoun for 'I'?", "options": ["Tú", "Él", "Yo", "Ella"], "answer": "Yo", "explanation": "Lesson 1: 'Yo' means I."},
        {"id": 3, "type": "mcq", "question": "How do you say 'I am' (identity)?", "options": ["Estoy", "Soy", "Tengo", "Hago"], "answer": "Soy", "explanation": "Lesson 1 & 19: 'Soy' is used for identity (I am)."},
        {"id": 4, "type": "mcq", "question": "Translate: 'A coffee, please.'", "options": ["Una Coca-Cola, por favor.", "Un café, por favor.", "Dos cafés, por favor.", "Un café y una cerveza."], "answer": "Un café, por favor.", "explanation": "Lesson 1: 'Un café' is a coffee, and 'por favor' is please."},
        {"id": 5, "type": "mcq", "question": "Which of these is the feminine article and noun?", "options": ["Un café", "El carro", "Una Coca-Cola", "El coche"], "answer": "Una Coca-Cola", "explanation": "Lesson 1: 'Coca-Cola' is feminine, so it takes 'una'."},
        {"id": 6, "type": "mcq", "question": "How do you say 'and' in Spanish?", "options": ["Y", "O", "Pero", "Así"], "answer": "Y", "explanation": "Lesson 1: 'Y' is the conjunction for 'and'."},
        {"id": 7, "type": "mcq", "question": "Translate: 'Two coffees and a Coca-Cola, please.'", "options": ["Dos Coca-Colas y un café, por favor.", "Un café y dos Coca-Colas, por favor.", "Dos cafés y una Coca-Cola, por favor.", "Un café por favor."], "answer": "Dos cafés y una Coca-Cola, por favor.", "explanation": "Lesson 1: 'Dos cafés' (two coffees), 'y' (and), 'una Coca-Cola' (a Coca-Cola)."},
        {"id": 8, "type": "mcq", "question": "How do you say 'I want'?", "options": ["Necesito", "Tengo", "Quiero", "Sé"], "answer": "Quiero", "explanation": "Lesson 1 & 5: 'Quiero' comes from the verb querer (to want)."},
        {"id": 9, "type": "mcq", "question": "How do you say 'thank you very much'?", "options": ["Gracias", "Muchas gracias", "Por favor", "Lo siento"], "answer": "Muchas gracias", "explanation": "Lesson 2: 'Muchas gracias' means thank you very much."},
        {"id": 10, "type": "mcq", "question": "Translate 'possible' and 'impossible' into Spanish.", "options": ["Posible / Imposible", "Bueno / Malo", "Importante / Así", "Fácil / Difícil"], "answer": "Posible / Imposible", "explanation": "Lesson 2: Spelled almost identically to English but pronounced differently."},
        {"id": 11, "type": "mcq", "question": "How do you say 'It is' (identity/characteristic)?", "options": ["Está", "Es", "Soy", "Eres"], "answer": "Es", "explanation": "Lesson 2: 'Es' is the third-person singular form of ser (to be)."},
        {"id": 12, "type": "mcq", "question": "How do you say 'for me' and 'for you'?", "options": ["Para mí / Para ti", "Para ti / Para mí", "Por mí / Por ti", "De mí / De ti"], "answer": "Para mí / Para ti", "explanation": "Lesson 2: 'Para mí' means for me; 'para ti' means for you."},
        {"id": 13, "type": "mcq", "question": "Translate: 'It's not for you.'", "options": ["No es para mí.", "Es para ti.", "No es para ti.", "Es imposible para ti."], "answer": "No es para ti.", "explanation": "Lesson 2: 'No es' (It's not) + 'para ti' (for you)."},
        {"id": 14, "type": "mcq", "question": "What are the Spanish words for 'the' (masculine/feminine singular)?", "options": ["Un / Una", "El / La", "Los / Las", "Lo / La"], "answer": "El / La", "explanation": "Lesson 2: 'El' is masculine singular; 'La' is feminine singular."},
        {"id": 15, "type": "mcq", "question": "Translate: 'The coffee's not for me. It's for you.'", "options": ["El café es para mí. No es para ti.", "El café no es para mí. Es para ti.", "La Coca-Cola no es para mí.", "El coche no es para mí."], "answer": "El café no es para mí. Es para ti.", "explanation": "Lesson 2: Translates directly matching masculine nouns and pronouns."},
        {"id": 16, "type": "mcq", "question": "How do you ask 'Is it for you?'", "options": ["¿No es para ti?", "¿Es para ti?", "¿Es para mí?", "¿Qué tienes?"], "answer": "¿Es para ti?", "explanation": "Lesson 3: Intonation changes a statement into a question in Spanish."},
        {"id": 17, "type": "mcq", "question": "How do you say 'important'?", "options": ["Importante", "Bueno", "Malo", "Posible"], "answer": "Importante", "explanation": "Lesson 3: 'Importante' means important."},
        {"id": 18, "type": "mcq", "question": "Translate: 'It's not important.'", "options": ["Es importante.", "¿Es importante?", "No es importante.", "Es muy importante."], "answer": "No es importante.", "explanation": "Lesson 3: Place 'no' before the verb to make it negative."},
        {"id": 19, "type": "mcq", "question": "What do 'bueno' and 'malo' mean?", "options": ["Very / Bad", "Good / Bad", "Important / Possible", "Now / Like that"], "answer": "Good / Bad", "explanation": "Lesson 3: 'Bueno' = good, 'malo' = bad."},
        {"id": 20, "type": "mcq", "question": "Translate: 'It's not good for me.'", "options": ["No es malo para mí.", "Es bueno para ti.", "No es bueno para mí.", "Es muy malo."], "answer": "No es bueno para mí.", "explanation": "Lesson 3: 'No es bueno' (It's not good) + 'para mí' (for me)."},
        {"id": 21, "type": "mcq", "question": "How do you say 'very'?", "options": ["Mucho", "Muy", "Así", "Ahora"], "answer": "Muy", "explanation": "Lesson 3: 'Muy' modifies adjectives to mean 'very'."},
        {"id": 22, "type": "mcq", "question": "How do you say 'Excuse me!' formally?", "options": ["Lo siento", "Por favor", "Perdone", "Adiós"], "answer": "Perdone", "explanation": "Lesson 4: 'Perdone' is a formal way to say excuse me."},
        {"id": 23, "type": "mcq", "question": "What is 'a water' and 'a beer'?", "options": ["Un café / Una Coca-Cola", "Un agua / Una cerveza", "Un coche / Un carro", "Un agua / Un café"], "answer": "Un agua / Una cerveza", "explanation": "Lesson 4: Note that 'agua' uses 'un' in the singular to avoid double 'a' sounds, but 'cerveza' is standard feminine 'una'."},
        {"id": 24, "type": "mcq", "question": "How does a female say 'I am bad'?", "options": ["Soy bueno.", "Soy buena.", "Soy malo.", "Soy mala."], "answer": "Soy mala.", "explanation": "Lesson 4: Adjectives change ending to '-a' for females."},
        {"id": 25, "type": "mcq", "question": "How do you say 'I'm sorry'?", "options": ["Perdone", "Lo siento", "Por favor", "Muchas gracias"], "answer": "Lo siento", "explanation": "Lesson 4: 'Lo siento' literally means 'I feel it', used for 'I'm sorry'."},
        {"id": 26, "type": "mcq", "question": "How do you say 'but'?", "options": ["Y", "Así", "Pero", "Ahora"], "answer": "Pero", "explanation": "Lesson 4: 'Pero' means but."},
        {"id": 27, "type": "mcq", "question": "Translate: 'I'm sorry but it's not possible.'", "options": ["Lo siento pero es posible.", "Perdone pero no es posible.", "Lo siento pero no es posible.", "Lo siento pero no soy Carlos."], "answer": "Lo siento pero no es posible.", "explanation": "Lesson 4: Combines 'Lo siento', 'pero', and 'no es posible'."},
        {"id": 28, "type": "mcq", "question": "How do you say 'I have' and 'I don't have'?", "options": ["Quiero / No quiero", "Necesito / No necesito", "Tengo / No tengo", "Sé / No sabes"], "answer": "Tengo / No tengo", "explanation": "Lesson 4: From the verb tener (to have)."},
        {"id": 29, "type": "mcq", "question": "How do you say 'I have it'?", "options": ["No lo tengo.", "Lo tengo.", "Lo quiero.", "Lo necesito."], "answer": "Lo tengo.", "explanation": "Lesson 4: 'Lo' is the object pronoun for 'it', placed before the conjugated verb."},
        {"id": 30, "type": "mcq", "question": "What are the Spain (ES) and Latin American (AmL) words for 'a car'?", "options": ["Un café / Un carro", "Un coche / Un carro", "Un carro / Un coche", "El coche / La cocina"], "answer": "Un coche / Un carro", "explanation": "Lesson 4: 'Un coche' is used predominantly in Spain; 'un carro' in Latin America."},
        {"id": 31, "type": "mcq", "question": "How do you say 'I need'?", "options": ["Quiero", "Tengo", "Necesito", "Hago"], "answer": "Necesito", "explanation": "Lesson 5: From the verb necesitar (to need)."},
        {"id": 32, "type": "mcq", "question": "How do you say 'now'?", "options": ["Así", "Ahora", "Hoy", "Mañana"], "answer": "Ahora", "explanation": "Lesson 5: 'Ahora' means now."},
        {"id": 33, "type": "mcq", "question": "How do you say 'like that' or 'that way'?", "options": ["Así", "Ahora", "Pero", "Y"], "answer": "Así", "explanation": "Lesson 5: 'Así' means like that / that way."},
        {"id": 34, "type": "mcq", "question": "Translate: 'I want it, but I don't need it now.'", "options": ["Lo quiero, pero no lo necesito ahora.", "Lo necesito, pero no lo quiero ahora.", "No lo quiero así.", "Lo siento pero no tengo un coche."], "answer": "Lo quiero, pero no lo necesito ahora.", "explanation": "Lesson 5: Sentence construction using direct object pronouns and conjunctions."},
        {"id": 35, "type": "mcq", "question": "How do you say 'goodbye'?", "options": ["Hola", "Adiós", "Gracias", "Perdone"], "answer": "Adiós", "explanation": "Lesson 5: 'Adiós' means goodbye."},
        {"id": 36, "type": "mcq", "question": "How do you say 'How are you?' informally?", "options": ["¿Cómo está?", "¿Cómo estás?", "Buenos días", "Muy bien, gracias"], "answer": "¿Cómo estás?", "explanation": "Lesson 6: The final '-s' makes it informal (tú form)."},
        {"id": 37, "type": "mcq", "question": "How do you say 'Good morning'?", "options": ["Buenas noches", "Buenos días", "Hola", "Adiós"], "answer": "Buenos días", "explanation": "Lesson 6: 'Buenos días' is standard greeting for morning."},
        {"id": 38, "type": "mcq", "question": "How do you say 'Very well, thanks'?", "options": ["Muy mal, gracias", "Muy bien, gracias", "Lo siento", "Por favor"], "answer": "Muy bien, gracias", "explanation": "Lesson 6: 'Muy bien' (very well) + 'gracias' (thanks)."},
        {"id": 39, "type": "mcq", "question": "How do you say 'you have' (informal)?", "options": ["Tengo", "Tiene", "Tienes", "Sales"], "answer": "Tienes", "explanation": "Lesson 6: 'Tienes' is the tú form of tener."},
        {"id": 40, "type": "mcq", "question": "How do you ask 'What do you have?'", "options": ["¿Qué quieres?", "¿Qué tienes?", "¿Qué necesitas?", "¿Cómo estás?"], "answer": "¿Qué tienes?", "explanation": "Lesson 6: '¿Qué...?' means what, combined with tienes."},
        {"id": 41, "type": "mcq", "question": "How do you say 'in' or 'on' in Spanish?", "options": ["De", "Para", "En", "Por"], "answer": "En", "explanation": "Lesson 17: 'En' acts as both in and on depending on context."},
        {"id": 42, "type": "mcq", "question": "Translate: 'Carlos is in the house.'", "options": ["Carlos está en el coche.", "Carlos es de la casa.", "Carlos está en la casa.", "Carlos tiene una casa."], "answer": "Carlos está en la casa.", "explanation": "Lesson 17: Estar is used for location ('está en la casa')."},
        {"id": 43, "type": "mcq", "question": "What does the infinitive verb 'hacer' mean?", "options": ["To know", "To do / to make", "To eat", "To leave"], "answer": "To do / to make", "explanation": "Lesson 17: 'Hacer' means to do or to make."},
        {"id": 44, "type": "mcq", "question": "Translate: 'I want to do it here.'", "options": ["Quiero hacerlo aquí.", "Quiero saber aquí.", "Necesito hacerlo ahora.", "No puedo hacerlo."], "answer": "Quiero hacerlo aquí.", "explanation": "Lesson 17: 'Hacerlo' attaches the object pronoun 'lo' to the infinitive 'hacer'."},
        {"id": 45, "type": "mcq", "question": "What is the difference between 'saber' and 'sé'?", "options": ["Saber is 'you know', sé is 'I know'", "Saber is 'to know' (infinitive), sé is 'I know' (conjugated)", "Saber is 'to eat', sé is 'I eat'", "They mean the same thing and are interchangeable"], "answer": "Saber is 'to know' (infinitive), sé is 'I know' (conjugated)", "explanation": "Lesson 17: 'Saber' is the base verb; '(yo) sé' is the first person singular form."},
        {"id": 46, "type": "mcq", "question": "Translate: 'Do you know when you have to leave?'", "options": ["¿Sabes por qué tienes que salir?", "¿Sabes cuándo tienes que salir?", "¿Sabes dónde está la silla?", "Sabe ella cuándo salir?"], "answer": "¿Sabes cuándo tienes que salir?", "explanation": "Lesson 17: '¿Sabes...?' (Do you know) + 'cuándo' (when) + 'tienes que salir' (you have to leave)."},
        {"id": 47, "type": "mcq", "question": "How do you say 'she knows'?", "options": ["Sé", "Sabes", "Sabe", "Cena"], "answer": "Sabe", "explanation": "Lesson 17: 'Sabe' is the third-person singular (él/ella/usted) form of saber."},
        {"id": 48, "type": "mcq", "question": "What do 'comer' and 'cenar' mean respectively?", "options": ["To do / To know", "To leave / To have", "To eat / To have dinner", "To see / To want"], "answer": "To eat / To have dinner", "explanation": "Lesson 17: 'Comer' is to eat; 'cenar' is to have dinner."},
        {"id": 49, "type": "mcq", "question": "Translate: 'Where does he have dinner?'", "options": ["¿Cuándo cenas?", "¿Dónde cena?", "¿Dónde como?", "¿Por qué sale?"], "answer": "¿Dónde cena?", "explanation": "Lesson 17: '¿Dónde...?' means where, 'cena' is the third-person singular of cenar."},
        {"id": 50, "type": "mcq", "question": "What does 'salir' mean?", "options": ["To stay", "To see", "To leave / to go out", "To say"], "answer": "To leave / to go out", "explanation": "Lesson 18: 'Salir' is the infinitive form meaning to leave."},
        {"id": 51, "type": "mcq", "question": "What is the 'I' form of the verb salir?", "options": ["Salo", "Salgo", "Sales", "Sale"], "answer": "Salgo", "explanation": "Lesson 18: 'Salir' is irregular in the first person: 'yo salgo'."},
        {"id": 52, "type": "mcq", "question": "Translate: 'She leaves tonight.'", "options": ["Sale mañana.", "No salgo hoy.", "Sale esta noche.", "Sales ahora."], "answer": "Sale esta noche.", "explanation": "Lesson 18: 'Esta noche' means tonight; 'sale' is she leaves."},
        {"id": 53, "type": "mcq", "question": "Translate: 'Do you have a water?'", "options": ["¿Tengo un agua?", "¿Tienes un agua?", "¿Tiene una cerveza?", "¿Necesitas un agua?"], "answer": "¿Tienes un agua?", "explanation": "Lesson 18: 'Tienes' is the tú form of tener."},
        {"id": 54, "type": "mcq", "question": "When expressing being busy or tired, which verb 'to be' is used?", "options": ["Ser", "Estar", "Hacer", "Tener"], "answer": "Estar", "explanation": "Lesson 18: Temporary states/conditions like busy (ocupado) or tired (cansado) use 'estar'."},
        {"id": 55, "type": "mcq", "question": "Translate: 'Is he tired?'", "options": ["¿Está ocupado?", "¿Es cansado?", "¿Está cansado?", "¿Está muy ocupada?"], "answer": "¿Está cansado?", "explanation": "Lesson 18: '¿Está cansado?' uses estar for a physical state."},
        {"id": 56, "type": "mcq", "question": "How do you conjugate 'necesitar' for 'she/he'?", "options": ["Necesito", "Necesitas", "Necesita", "Necesitan"], "answer": "Necesita", "explanation": "Lesson 18: Third person singular drops the '-s' to become 'necesita'."},
        {"id": 57, "type": "mcq", "question": "What does 'ver' mean?", "options": ["To want", "To see", "To say", "To be"], "answer": "To see", "explanation": "Lesson 19: 'Ver' is the infinitive meaning to see."},
        {"id": 58, "type": "mcq", "question": "How do you say 'I see'?", "options": ["Veo", "Ves", "Ve", "Verlo"], "answer": "Veo", "explanation": "Lesson 19: 'Yo veo' is the first person singular of ver."},
        {"id": 59, "type": "mcq", "question": "Translate: 'Do you see that it's not possible?'", "options": ["¿Ves que es imposible?", "¿Veo que no es posible?", "¿Ves que no es posible?", "¿Puede verlo?"], "answer": "¿Ves que no es posible?", "explanation": "Lesson 19: '¿Ves que...?' (Do you see that...?) + 'no es posible'."},
        {"id": 60, "type": "mcq", "question": "How do you say 'I can'?", "options": ["Puedo", "Puedes", "Puede", "Saber"], "answer": "Puedo", "explanation": "Lesson 19: 'Puedo' is the first person singular of poder (to be able to)."},
        {"id": 61, "type": "mcq", "question": "Translate: 'He sees that I can't do it.'", "options": ["Veo que no puedo hacerlo.", "Ve que no puedo hacerlo.", "Ve que puede salir.", "Quiere saber."], "answer": "Ve que no puedo hacerlo.", "explanation": "Lesson 19: 'Ve' (He sees) + 'que no puedo hacerlo' (that I cannot do it)."},
        {"id": 62, "type": "mcq", "question": "Translate: 'She can leave when she wants.'", "options": ["Puede salir cuando quiere.", "Quiero cenar ahora.", "No puedo hacerlo ahora.", "Sale esta noche."], "answer": "Puede salir cuando quiere.", "explanation": "Lesson 19: 'Puede salir' (She can leave) + 'cuando quiere' (when she wants)."},
        {"id": 63, "type": "mcq", "question": "When expressing personal identity or names, which verb 'to be' is used?", "options": ["Estar", "Ser", "Tener", "Hacer"], "answer": "Ser", "explanation": "Lesson 19: Essential identity (names, origin) uses 'ser' (soy/eres/es)."},
        {"id": 64, "type": "mcq", "question": "Translate: 'Is she Carolina?'", "options": ["¿Está Carolina?", "¿Eres Carolina?", "¿Es Carolina?", "¿Quién es Carolina?"], "answer": "¿Es Carolina?", "explanation": "Lesson 19: Uses 'es' (from ser) because it asks about identity."},
        {"id": 65, "type": "mcq", "question": "What is the feminine form of 'Spanish'?", "options": ["Espanol", "Española", "Británica", "Americana"], "answer": "Española", "explanation": "Lesson 20: Nationalities ending in a consonant add '-a' for feminine format."},
        {"id": 66, "type": "mcq", "question": "Translate: 'I am British.' (assuming mixed/neutral/either gender context)", "options": ["Soy español.", "Soy americano.", "Soy británico/a.", "Estoy británico."], "answer": "Soy británico/a.", "explanation": "Lesson 20: Nationalities use the verb ser + the corresponding adjective."},
        {"id": 67, "type": "mcq", "question": "What are the object pronouns for 'me' and 'you' respectively?", "options": ["Lo / La", "Me / Te", "Mi / Ti", "Yo / Tú"], "answer": "Me / Te", "explanation": "Lesson 20: 'Me' and 'te' are used as object pronouns (e.g., verme, verte)."},
        {"id": 68, "type": "mcq", "question": "Translate: 'Can you see me?'", "options": ["¿Puedes verme?", "¿Puedo verte?", "¿Me ves?", "¿Puedes ver mi carro?"], "answer": "¿Puedes verme?", "explanation": "Lesson 20: The pronoun 'me' attaches directly to the end of the infinitive 'ver'."},

    let currentQuizData = [];

    // Knuth-Fisher-Yates Shuffle Algorithm to guarantee safe array randomization
    function shuffle(array) {
        let currentIndex = array.length, randomIndex;
        while (currentIndex != 0) {
            randomIndex = Math.floor(Math.random() * currentIndex);
            currentIndex--;
            [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
        }
        return array;
    }

    function initQuiz() {
        // Clear past states
        document.getElementById('results').style.display = 'none';
        document.getElementById('submitBtn').style.display = 'block';
        
        // Deep copy and Scramble both question placement and alternate formatting
        currentQuizData = shuffle([...masterQuizData]);
        renderQuiz();
    }

    function renderQuiz() {
        const container = document.getElementById('questionsContainer');
        container.innerHTML = ''; // Wipe clean

        currentQuizData.forEach((q, index) => {
            const card = document.createElement('div');
            card.className = 'question-card';
            card.id = `qcard-${q.id}`;

            const qText = document.createElement('div');
            qText.className = 'question-text';
            qText.innerText = `${index + 1}. ${q.question}`;
            card.appendChild(qText);

            if (q.type === 'mcq') {
                const optsDiv = document.createElement('div');
                optsDiv.className = 'options';
                q.options.forEach(opt => {
                    const label = document.createElement('label');
                    label.className = 'option-label';
                    label.id = `label-${q.id}-${opt.replace(/[^a-zA-Z0-9]/g, '')}`;
                    label.innerHTML = `<input type="radio" name="question-${q.id}" value="${opt}"> ${opt}`;
                    optsDiv.appendChild(label);
                });
                card.appendChild(optsDiv);
            } else if (q.type === 'fill') {
                const input = document.createElement('input');
                input.type = 'text';
                input.className = 'text-input';
                input.id = `input-${q.id}`;
                input.name = `question-${q.id}`;
                input.placeholder = 'Type matching translation word...';
                card.appendChild(input);
            }

            const expBox = document.createElement('div');
            expBox.className = 'explanation-box';
            expBox.id = `exp-${q.id}`;
            card.appendChild(expBox);

            container.appendChild(card);
        });
    }

    function gradeQuiz() {
        let score = 0;
        let totalQuestions = currentQuizData.length;
        
        currentQuizData.forEach(q => {
            const fieldName = `question-${q.id}`;
            let userAns = '';
            
            // Extract selections
            if (q.type === 'mcq') {
                const selected = document.querySelector(`input[name="${fieldName}"]:checked`);
                userAns = selected ? selected.value : '';
            } else if (q.type === 'fill') {
                const inputField = document.querySelector(`input[name="${fieldName}"]`);
                userAns = inputField ? inputField.value.trim() : '';
            }

            const isCorrect = userAns.toLowerCase() === q.answer.toLowerCase();
            const expBox = document.getElementById(`exp-${q.id}`);
            card = document.getElementById(`qcard-${q.id}`);
            
            // Clear prior grading styling safely
            card.style.borderLeft = "none";
            
            if (isCorrect) {
                score++;
                expBox.className = 'explanation-box correct-bg';
                expBox.style.display = 'block';
                expBox.innerHTML = `<span class="correct">✓ Correct</span> — <strong>${q.answer}</strong>. ${q.explanation}`;
                
                // Color choices green if multiple choice
                if (q.type === 'mcq') {
                    const cleanOptId = `label-${q.id}-${userAns.replace(/[^a-zA-Z0-9]/g, '')}`;
                    const correctLabel = document.getElementById(cleanOptId);
                    if (correctLabel) correctLabel.style.backgroundColor = '#d1e7dd';
                }
            } else {
                expBox.className = 'explanation-box incorrect-bg';
                expBox.style.display = 'block';
                expBox.innerHTML = `
                    <span class="incorrect">✗ Incorrect</span><br>
                    <strong>Your Input:</strong> ${userAns || '<i>No Answer</i>'}<br>
                    <strong>Correct Translation:</strong> <span class="correct">${q.answer}</span><br>
                    <strong>Reasoning:</strong> ${q.explanation}
                `;
                
                // Flag specific faulty values using CSS accents
                if (q.type === 'mcq' && userAns) {
                    const cleanOptId = `label-${q.id}-${userAns.replace(/[^a-zA-Z0-9]/g, '')}`;
                    const wrongLabel = document.getElementById(cleanOptId);
                    if (wrongLabel) wrongLabel.style.backgroundColor = '#f8d7da';
                }
            }
        });

        // Set up results block state metrics
        const resultsDiv = document.getElementById('results');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const statusMessage = document.getElementById('statusMessage');
        const actionButtons = document.getElementById('actionButtons');
        
        resultsDiv.style.display = 'block';
        document.getElementById('submitBtn').style.display = 'none';

        const finalScorePercent = (score / totalQuestions) * 100;
        scoreDisplay.innerText = `You scored ${score} out of ${totalQuestions} points (${finalScorePercent.toFixed(0)}%)`;

        // Rigid evaluation matching 100% boundary limit rules
        if (score === totalQuestions) {
            resultsDiv.className = "pass-box";
            scoreDisplay.className = "score-text pass";
            statusMessage.innerHTML = "<strong>¡Excelente! Perfect Score.</strong> You have fully mastered your Level 1 coursework items!";
            actionButtons.innerHTML = `<button type="button" class="btn" onclick="initQuiz()">Restart New Shuffled Quiz</button>`;
        } else {
            resultsDiv.className = "fail-box";
            scoreDisplay.className = "score-text fail";
            statusMessage.innerHTML = "<strong>Passing score is 100%.</strong> Please review the items you missed below and choose an option to continue.";
            
            actionButtons.innerHTML = `
                <button type="button" class="btn btn-secondary" onclick="initQuiz()">Retake the Quiz</button>
                <button type="button" class="btn" onclick="filterIncorrect()">Work on Incorrect Answers</button>
            `;
        }

        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function filterIncorrect() {
        // Filter elements out dynamically to isolate only bad data vectors
        currentQuizData.forEach(q => {
            const fieldName = `question-${q.id}`;
            let userAns = '';
            
            if (q.type === 'mcq') {
                const selected = document.querySelector(`input[name="${fieldName}"]:checked`);
                userAns = selected ? selected.value : '';
            } else if (q.type === 'fill') {
                const inputField = document.querySelector(`input[name="${fieldName}"]`);
                userAns = inputField ? inputField.value.trim() : '';
            }

            const isCorrect = userAns.toLowerCase() === q.answer.toLowerCase();
            const card = document.getElementById(`qcard-${q.id}`);
            
            if (isCorrect) {
                card.classList.add('hidden'); // Isolate out successes
            } else {
                card.classList.remove('hidden'); // Reveal faulty items clearly
                // Clear the wrong values out so user can guess again cleanly
                if (q.type === 'mcq') {
                    const checkedRadio = document.querySelector(`input[name="${fieldName}"]:checked`);
                    if (checkedRadio) checkedRadio.checked = false;
                    // Reset styling backgrounds
                    q.options.forEach(opt => {
                        const cleanOptId = `label-${q.id}-${opt.replace(/[^a-zA-Z0-9]/g, '')}`;
                        const lbl = document.getElementById(cleanOptId);
                        if (lbl) lbl.style.backgroundColor = 'transparent';
                    });
                } else if (q.type === 'fill') {
                    const inputField = document.getElementById(`input-${q.id}`);
                    if (inputField) inputField.value = '';
                }
                // Hide explanation box again for re-testing environment
                document.getElementById(`exp-${q.id}`).style.display = 'none';
            }
        });

        // Toggle state displays back to processing format
        document.getElementById('results').style.display = 'none';
        document.getElementById('submitBtn').style.display = 'block';
        
        // Target focus on remaining workload array layout positions smoothly
        const firstWrongCard = document.querySelector('.question-card:not(.hidden)');
        if (firstWrongCard) {
            firstWrongCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
    }

    // Initialize application layout tracking
    window.onload = initQuiz;
</script>
